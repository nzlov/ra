<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>RA Calculator</title>
    <style>
      :root {
        color: #17202a;
        background: #f6f8fb;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 18px;
      }

      main {
        display: grid;
        gap: 14px;
      }

      header {
        display: grid;
        gap: 4px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #5f6b7a;
      }

      .sheet {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(130px, 34%);
        gap: 10px;
      }

      textarea,
      .results {
        width: 100%;
        border: 1px solid #cbd5df;
        border-radius: 7px;
        padding: 12px;
        background: #ffffff;
        color: #111827;
        font: 18px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      textarea {
        min-height: 320px;
        resize: vertical;
        outline: 0;
      }

      textarea:focus {
        border-color: #2f6f4e;
      }

      .results {
        min-height: 320px;
        color: #2f6f4e;
        white-space: pre-wrap;
      }

      .line {
        min-height: 1.6em;
      }

      .invalid {
        color: #b42318;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      button {
        width: max-content;
        border: 1px solid #cbd5df;
        border-radius: 7px;
        background: #ffffff;
        color: #17202a;
        padding: 8px 12px;
        font: inherit;
      }

      #status {
        color: #5f6b7a;
      }

      @media (max-width: 640px) {
        body {
          padding: 12px;
        }

        .sheet {
          grid-template-columns: 1fr;
        }

        textarea,
        .results {
          min-height: 220px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Calculation Paper</h1>
        <p>One expression per line. Open with = to append a starter expression.</p>
      </header>
      <section class="sheet">
        <textarea id="paper" autocomplete="off" spellcheck="false"></textarea>
        <div id="results" class="results" aria-live="polite"></div>
      </section>
      <div class="toolbar">
        <button id="copy" type="button">Copy results</button>
        <span id="status">Loading</span>
      </div>
    </main>
    <script>
      const paper = document.querySelector('#paper');
      const results = document.querySelector('#results');
      const copy = document.querySelector('#copy');
      const status = document.querySelector('#status');
      const paperKey = 'papers/current';

      function calculate(value) {
        const expression = value.trim().replace(/^=/, '');
        if (!expression) {
          return '';
        }
        try {
          const parser = new Parser(expression);
          const answer = parser.expression();
          parser.skipSpaces();
          if (parser.position !== parser.input.length || !Number.isFinite(answer)) {
            return 'Invalid expression';
          }
          return String(answer);
        } catch {
          return 'Invalid expression';
        }
      }

      function calculateLines(text) {
        return text.split('\n').map(calculate);
      }

      class Parser {
        constructor(input) {
          this.input = input;
          this.position = 0;
        }

        expression() {
          let value = this.term();
          while (true) {
            if (this.match('+')) {
              value += this.term();
            } else if (this.match('-')) {
              value -= this.term();
            } else {
              return value;
            }
          }
        }

        term() {
          let value = this.factor();
          while (true) {
            if (this.match('*')) {
              value *= this.factor();
            } else if (this.match('/')) {
              value /= this.factor();
            } else {
              return value;
            }
          }
        }

        factor() {
          this.skipSpaces();
          if (this.match('+')) {
            return this.factor();
          }
          if (this.match('-')) {
            return -this.factor();
          }
          if (this.match('(')) {
            const value = this.expression();
            if (!this.match(')')) {
              throw new Error('missing closing parenthesis');
            }
            return value;
          }
          return this.number();
        }

        number() {
          this.skipSpaces();
          const start = this.position;
          while (this.position < this.input.length && /[0-9.]/.test(this.input[this.position])) {
            this.position += 1;
          }
          if (start === this.position) {
            throw new Error('missing number');
          }
          const raw = this.input.slice(start, this.position);
          if (!/^(?:\d+(?:\.\d*)?|\.\d+)$/.test(raw)) {
            throw new Error('invalid number');
          }
          return Number(raw);
        }

        match(token) {
          this.skipSpaces();
          if (this.input[this.position] !== token) {
            return false;
          }
          this.position += 1;
          return true;
        }

        skipSpaces() {
          while (this.position < this.input.length && /\s/.test(this.input[this.position])) {
            this.position += 1;
          }
        }
      }

      function render() {
        const lines = calculateLines(paper.value);
        results.replaceChildren(
          ...lines.map((line) => {
            const item = document.createElement('div');
            item.className = line === 'Invalid expression' ? 'line invalid' : 'line';
            item.textContent = line;
            return item;
          })
        );
        return lines;
      }

      async function loadPaper() {
        paper.value = await loadStoredPaper();
        const queryExpression = new URLSearchParams(location.search).get('q') || '';
        const previous = paper.value;
        paper.value = appendExpression(paper.value, queryExpression);
        if (paper.value !== previous) {
          await savePaper();
        }
        status.textContent = 'Ready';
        render();
        paper.focus();
      }

      async function loadStoredPaper() {
        if (!window.ra) {
          return '';
        }
        const result = await window.ra.invoke({type: 'store.get', key: paperKey});
        return typeof result?.value === 'string' ? result.value : '';
      }

      async function savePaper() {
        if (!window.ra) {
          return;
        }
        await window.ra.invoke({type: 'store.set', key: paperKey, value: paper.value});
      }

      function appendExpression(text, expression) {
        const cleaned = expression.trim().replace(/^=/, '').trim();
        if (!cleaned) {
          return text;
        }
        if (!text.trim()) {
          return cleaned;
        }
        return `${text.replace(/\s+$/, '')}\n${cleaned}`;
      }

      async function update() {
        render();
        await savePaper();
      }

      paper.addEventListener('input', update);
      copy.addEventListener('click', async () => {
        const text = calculateLines(paper.value).filter(Boolean).join('\n');
        if (!text || !window.ra) return;
        await window.ra.invoke({type: 'clipboard.write', text});
      });
      loadPaper();
    </script>
  </body>
</html>
